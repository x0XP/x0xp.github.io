<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x0XP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* General Page Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #0d1117;
        }

        /* Direct Body Animation: Heavy High-Contrast CRT Noise & Image combined */
        body {
            background-image: 
                /* High-contrast scanning line filter */
                repeating-linear-gradient(
                    0deg,
                    rgba(255, 255, 255, 0.15) 0px,
                    rgba(255, 255, 255, 0.15) 2px,
                    rgba(0, 0, 0, 0.4) 2px,
                    rgba(0, 0, 0, 0.4) 4px
                ),
                /* Dark Vignette */
                linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                /* Character Image */
                url('image0.jpg'); 
            
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            
            /* Forces a violent, rapid shifting of the pixel grid lines */
            animation: hard-static 0.05s infinite linear;
        }

        /* 📺 Aggressive CRT Shifting Keyframes */
        @keyframes hard-static {
            0% { background-size: 100% 4px, cover, cover; }
            50% { background-size: 100% 3px, cover, cover; background-position: 0 1px, center, center; }
            100% { background-size: 100% 5px, cover, cover; background-position: 0 -1px, center, center; }
        }

        /* The Semi-Transparent Central Card */
        .card {
            background-color: rgba(15, 20, 28, 0.9); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(48, 54, 61, 0.8);
            border-radius: 12px;
            width: 380px;
            max-width: 90%;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Circular Avatar */
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* Text Styling */
        h1 {
            font-size: 28px;
            margin: 0 0 8px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin: 0 0 25px 0;
            font-weight: 400;
        }

        /* The Container for the Two Buttons */
        .button-container {
            display: flex;
            gap: 12px; 
            width: 100%;
        }

        /* Base Styles for All Buttons */
        .btn {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px; 
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.2s, transform 0.1s;
            cursor: pointer;
        }

        .btn i {
            font-size: 16px; 
        }

        /* Specific Button Colors (GitHub) */
        .btn-github {
            background-color: #24292e;
            color: #ffffff;
            border: 1px solid rgba(250, 250, 250, 0.15);
        }

        .btn-github:hover {
            background-color: #2f363d;
        }

        /* Specific Button Colors (Discord) */
        .btn-discord {
            background-color: #5865F2;
            color: #ffffff;
        }

        .btn-discord:hover {
            background-color: #4e5aca;
        }

        .btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="image0.jpg" alt="Avatar" class="avatar">
        
        <h1>x0XP</h1>
        <p>im lazy so i used ai to make this instead of myself</p>
        
        <div class="button-container">
            <a href="https://github.com/x0XP" target="_blank" class="btn btn-github">
                <i class="fab fa-github"></i> GitHub Profile
            </a>
            
            <a href="YOUR_DISCORD_LINK_HERE" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> Discord
            </a>
        </div>
    </div>

</body>
</html>
