<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x0XP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* General Page Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevent scrolling */
        }

        /* The Background Image with a Dark Wash AND Animated TV Static */
        body {
            background-color: #0d1117; 
            background-image: 
                /* Layer 1: Animated micro-static lines overlay */
                repeating-linear-gradient(
                    0deg,
                    rgba(255, 255, 255, 0.05) 0px,
                    rgba(255, 255, 255, 0.05) 1px,
                    transparent 1px,
                    transparent 2px
                ),
                /* Layer 2: Dark Vignette / Tint overlay */
                linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)), 
                /* Layer 3: Your character image */
                url('image0.jpg'); 
            
            /* Sizing for all 3 layers respectively */
            background-size: 100% 4px, cover, cover;
            background-position: center;
            background-repeat: repeat, no-repeat, no-repeat;
            
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;

            /* This triggers the static vibration animation */
            animation: tv-static 0.2s infinite steps(4);
        }

        /* 📺 The TV Static Animation Keyframes */
        @keyframes tv-static {
            0% { background-position: 0 0, center, center; }
            25% { background-position: 0 1px, center, center; }
            50% { background-position: 0 -1px, center, center; }
            75% { background-position: 0 2px, center, center; }
            100% { background-position: 0 -2px, center, center; }
        }

        /* The Semi-Transparent Central Card */
        .card {
            background-color: rgba(22, 27, 34, 0.85); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(48, 54, 61, 0.8);
            border-radius: 12px;
            width: 380px;
            max-width: 90%;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.36);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2; /* Ensures card stays sharply on top of the static */
        }

        /* The Circular Avatar */
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Text Styling */
        h1 {
            font-size: 28px;
            margin: 0 0 8px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin: 0 0 25px 0;
            font-weight: 400;
        }

        /* The Container for the Two Buttons */
        .button-container {
            display: flex;
            gap: 12px; 
            width: 100%;
        }

        /* Base Styles for All Buttons */
        .btn {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px; 
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.2s, transform 0.1s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .btn i {
            font-size: 16px; 
        }

        /* Specific Button Colors (GitHub) */
        .btn-github {
            background-color: #24292e;
            color: #ffffff;
            border-color: rgba(240, 246, 252, 0.1);
        }

        .btn-github:hover {
            background-color: #2f363d;
        }

        /* Specific Button Colors (Discord) */
        .btn-discord {
            background-color: #5865F2;
            color: #ffffff;
        }

        .btn-discord:hover {
            background-color: #4e5aca;
        }

        /* Small interaction on click */
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="image0.jpg" alt="Avatar" class="avatar">
        
        <h1>x0XP</h1>
        <p>bruhh</p>
        
        <div class="button-container">
            <a href="https://github.com/x0XP" target="_blank" class="btn btn-github">
                <i class="fab fa-github"></i> GitHub Profile
            </a>
            
            <a href="https://discord.com/" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> Discord
            </a>
        </div>
    </div>

</body>
</html>
