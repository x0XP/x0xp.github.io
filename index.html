<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x0XP</title>
    <link id="favicon" rel="icon" type="image/png" href="image0.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <img src="image0.jpg" alt="Avatar" class="avatar">
        
        <h1>x0XP</h1>
        <p>nerdssss</p>
        
        <div class="button-container">
            <div class="button-row">
                <a href="https://github.com/x0XP" target="_blank" class="btn btn-github">
                    <i class="fab fa-github"></i> GitHub
                </a>
                
                <a href="https://www.youtube.com/@xZeRoXP" target="_blank" class="btn btn-youtube">
                    <i class="fab fa-youtube"></i> YouTube
                </a>
            </div>
            
            <a href="https://wiseoldman.net/players/x0XP" target="_blank" class="btn btn-wom">
                <i class="fas fa-hat-wizard"></i> Wise Old Man
            </a>
        </div>
    </div>

    <script>
        // 1. Favicon Rounded Masking Engine
        window.addEventListener('DOMContentLoaded', () => {
            const img = new Image();
            img.src = 'image0.jpg';
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 64; canvas.height = 64;
                ctx.beginPath(); ctx.arc(32, 32, 32, 0, Math.PI * 2); ctx.clip();
                ctx.drawImage(img, 0, 0, 64, 64);
                document.getElementById('favicon').setAttribute('href', canvas.toDataURL('image/png'));
            };
        });

        // 2. Synthesized Web Audio API UI Click Engine
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playHoverTick() {
            try {
                initAudio();
                if (!audioCtx || audioCtx.state === 'suspended') return;

                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(650, audioCtx.currentTime); 

                gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime); 
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05); 

                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.06);
            } catch (e) {}
        }

        // Standard user interaction listeners to safely catch user context unblocking rules
        window.addEventListener('click', initAudio, { once: true });
        window.addEventListener('keydown', initAudio, { once: true });

        // Attach listeners across all your links
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('mouseenter', playHoverTick);
        });
    </script>

</body>
</html>
