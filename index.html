<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x0XP - My Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* General Page Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevent scrolling */
        }

        /* 1. The Background Image with a Dark Wash */
        body {
            background-color: #0d1117; /* Fallback color */
            /* REPLACE 'background.png' with your actual background image filename */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('iamge0.jpg'); 
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        /* 2. The Semi-Transparent Central Card */
        .card {
            background-color: rgba(22, 27, 34, 0.85); /* Semi-transparent background */
            backdrop-filter: blur(10px); /* Optional: Adds a "frosted glass" effect */
            border: 1px solid rgba(48, 54, 61, 0.8);
            border-radius: 12px;
            width: 380px;
            max-width: 90%;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.36);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3. The Circular Avatar */
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            /* Optional: Add a border around the avatar if you want */
            /* border: 2px solid #ffffff; */
        }

        /* 4. Text Styling */
        h1 {
            font-size: 28px;
            margin: 0 0 8px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin: 0 0 25px 0;
            font-weight: 400;
        }

        /* 5. The Container for the Two Buttons */
        .button-container {
            display: flex;
            gap: 12px; /* Space between the buttons */
            width: 100%;
        }

        /* 6. Base Styles for All Buttons */
        .btn {
            flex: 1; /* Make both buttons the same size */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px; /* Space between icon and text */
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.2s, transform 0.1s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .btn i {
            font-size: 16px; /* Icon size */
        }

        /* 7. Specific Button Colors (GitHub) */
        .btn-github {
            background-color: #24292e;
            color: #ffffff;
            border-color: rgba(240, 246, 252, 0.1);
        }

        .btn-github:hover {
            background-color: #2f363d;
        }

        /* 8. Specific Button Colors (Discord) */
        .btn-discord {
            background-color: #5865F2;
            color: #ffffff;
        }

        .btn-discord:hover {
            background-color: #4e5aca;
        }

        /* Small interaction on click */
        .btn:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

    <div class="card">
        <img src="image0.jpg" alt="Avatar" class="avatar">
        
        <h1>x0XP</h1>
        <p>bruh</p>
        
        <div class="button-container">
            <a href="https://github.com/x0XP" target="_blank" class="btn btn-github">
                <i class="fab fa-github"></i> GitHub Profile
            </a>
            
            <a href="https://discord.com/" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> Discord
            </a>
        </div>
    </div>

</body>
</html>
